{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-body">
                <h3 class="text-center">Quase lá!</h3>
                <p class="text-muted text-center">Para começar, precisamos saber o nome da sua empresa.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Nome da Empresa</label>
                        <input type="text" name="nome_empresa" class="form-control" placeholder="Ex: Transportadora Silva" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-success btn-lg">Criar Minha Conta</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
